<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IPL Mock Auction{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="{{ url_for('static', filename='js/3d-effects.js') }}"></script>
</head>
<body>
    <nav class="fade-in">
        <div class="container">
            <a href="{{ url_for('main.index') }}">🏏 IPL Mock Auction</a> |
            <a href="{{ url_for('main.register') }}">Register Team</a> |
            <a href="{{ url_for('main.login') }}">Login</a> |
            <a href="{{ url_for('main.admin_login') }}">Admin Panel</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert {{ category }} slide-up" id="alert-{{ loop.index }}">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card bounce-in">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        // Enhanced animations
        document.addEventListener('DOMContentLoaded', function() {
            // Alert animations with stagger
            anime({
                targets: '.alert',
                translateY: [-20, 0],
                opacity: [0, 1],
                duration: 600,
                easing: 'easeOutExpo',
                delay: anime.stagger(200)
            });

            // Heading animations
            anime({
                targets: 'h1, h2',
                translateY: [-30, 0],
                opacity: [0, 1],
                duration: 800,
                easing: 'easeOutExpo',
                delay: anime.stagger(150)
            });

            // Form elements animation
            anime({
                targets: 'form',
                translateY: [20, 0],
                opacity: [0, 1],
                duration: 600,
                easing: 'easeOutExpo',
                delay: 400
            });

            // Table rows animation
            anime({
                targets: 'table tr',
                translateX: [-20, 0],
                opacity: [0, 1],
                duration: 500,
                easing: 'easeOutExpo',
                delay: anime.stagger(50, {start: 600})
            });

            // Button hover effects
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('mouseenter', function() {
                    anime({
                        targets: this,
                        scale: 1.05,
                        duration: 200,
                        easing: 'easeOutExpo'
                    });
                });
                btn.addEventListener('mouseleave', function() {
                    anime({
                        targets: this,
                        scale: 1,
                        duration: 200,
                        easing: 'easeOutExpo'
                    });
                });
            });

            // Input focus animations
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', function() {
                    anime({
                        targets: this,
                        scale: 1.02,
                        duration: 300,
                        easing: 'easeOutExpo'
                    });
                });
                input.addEventListener('blur', function() {
                    anime({
                        targets: this,
                        scale: 1,
                        duration: 300,
                        easing: 'easeOutExpo'
                    });
                });
            });

            // Wallet display glow effect
            const walletDisplay = document.querySelector('.wallet-display');
            if (walletDisplay) {
                anime({
                    targets: walletDisplay,
                    boxShadow: ['0 0 0 rgba(255, 107, 53, 0)', '0 0 20px rgba(255, 107, 53, 0.5)', '0 0 0 rgba(255, 107, 53, 0)'],
                    duration: 2000,
                    easing: 'easeInOutSine',
                    loop: true
                });
            }

            // Form submission loading state
            document.querySelectorAll('form').forEach(form => {
                form.addEventListener('submit', function(e) {
                    const submitBtn = this.querySelector('button[type="submit"]');
                    if (submitBtn) {
                        submitBtn.innerHTML = '<span class="loading"></span> Processing...';
                        submitBtn.disabled = true;
                    }
                });
            });

            // Smooth scrolling for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });

            // Add cricket ball cursor effect on hover
            document.querySelectorAll('button, .delete-btn').forEach(btn => {
                btn.addEventListener('mouseenter', function() {
                    this.style.cursor = 'pointer';
                });
            });

            // Auto-hide alerts after 5 seconds
            setTimeout(() => {
                anime({
                    targets: '.alert',
                    opacity: 0,
                    translateY: -20,
                    duration: 500,
                    easing: 'easeInExpo',
                    complete: function() {
                        document.querySelectorAll('.alert').forEach(alert => {
                            alert.style.display = 'none';
                        });
                    }
                });
            }, 5000);
        });
    </script>
    <footer class="site-footer">
        <div class="container">
            <p>Created by <strong>NSHGAMER</strong> and <strong>YESHWANTH</strong></p>
        </div>
    </footer>
</body>
</html>
